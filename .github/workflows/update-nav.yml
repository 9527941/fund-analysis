name: Update Fund NAV Data

on:
  schedule:
    # 第一层：21:00 北京时间 (UTC 13:00) — 早捕，部分基金此时已出确认净值
    - cron: '0 13 * * 1-5'
    # 第二层：22:00 北京时间 (UTC 14:00) — 主更新，大部分基金此时净值已确认
    - cron: '0 14 * * 1-5'
    # 第三层：23:00 北京时间 (UTC 15:00) — 晚间兜底，防止Actions延迟
    - cron: '0 15 * * 1-5'
    # 第四层：次日 06:00 北京时间 (UTC 22:00 前一天) — 早晨补漏，处理延迟到次日的净值
    - cron: '0 22 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-nav:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest NAV data
        run: python .github/workflows/fetch_nav.py

      - name: Check if data is already up-to-date
        id: check
        run: |
          CACHED_DATE=$(python3 -c "import json; d=json.load(open('data/fund-nav.json')); print(d['updated'])" 2>/dev/null || echo "")
          TODAY=$(date -u +%Y-%m-%d)
          echo "cached_date=$CACHED_DATE"
          echo "today=$TODAY"
          if [ "$CACHED_DATE" = "$TODAY" ]; then
            # 检查是否所有基金的 jzrq 都是今天（说明确认净值已全部到位）
            ALL_TODAY=$(python3 -c "
import json
d=json.load(open('data/fund-nav.json'))
dates=[d['funds'][c]['jzrq'] for c in d['funds'] if 'jzrq' in d['funds'][c]]
print('yes' if dates and all(x==dates[0] for x in dates) else 'no')
" 2>/dev/null || echo "no")
            echo "all_today=$ALL_TODAY"
            if [ "$ALL_TODAY" = "yes" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "Data already up-to-date for $TODAY, skipping commit"
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "Cache updated today but some funds have older jzrq, will check for changes"
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "fund-bot"
          git config user.email "fund-bot[bot]@users.noreply.github.com"
          git add data/fund-nav.json index.html fund-report.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update fund data $(date +%Y-%m-%d)"
            git push --force-with-lease
          fi
