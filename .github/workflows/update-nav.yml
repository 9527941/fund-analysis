name: Update Fund NAV Data

on:
  schedule:
    # 每个工作日 22:00 北京时间 (UTC 14:00) — 净值当晚8-10点确认后立即更新
    - cron: '0 14 * * 1-5'
    # 兜底：23:00 北京时间 (UTC 15:00) — 防止Actions延迟导致22:00的任务太晚执行
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-nav:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest NAV data
        run: python .github/workflows/fetch_nav.py

      - name: Commit and push if changed
        run: |
          git config user.name "fund-bot"
          git config user.email "fund-bot[bot]@users.noreply.github.com"
          git add data/fund-nav.json index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update fund data $(date +%Y-%m-%d)"
            git push
          fi
