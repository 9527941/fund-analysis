name: Update Fund NAV (backup)
# v3 - 增加调度覆盖 + 简化逻辑 (2026-06-17)
# 作为 daily-nav.yml 的补充/备份，无去重检查

on:
  schedule:
    # 收盘后轮询窗口 (UTC 12:00-15:00 = BJT 20:00-23:00) — 与 daily-nav 重叠形成双保险
    - cron: '0 12 * * 1-5'    # BJT 20:00
    - cron: '0 13 * * 1-5'    # BJT 21:00
    - cron: '0 14 * * 1-5'    # BJT 22:00
    - cron: '0 15 * * 1-5'    # BJT 23:00
    # 次日补漏 (UTC 16:30+22:00+23:00+0:00+1:00 = BJT 00:30+06:00+07:00+08:00+09:00)
    - cron: '30 16 * * 2-6'   # BJT 00:30
    - cron: '0 22 * * 2-6'    # BJT 06:00
    - cron: '0 23 * * 2-6'    # BJT 07:00
    - cron: '0 0 * * 2-6'     # BJT 08:00
    - cron: '0 1 * * 2-6'     # BJT 09:00
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/.nav-trigger'
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python .github/workflows/fetch_nav.py
      - run: |
          git config user.name "fund-bot"
          git config user.email "fund-bot[bot]@users.noreply.github.com"
          git add data/fund-nav.json index.html fund-report.html
          git diff --cached --quiet || (git commit -m "auto: update fund data" && git push)
