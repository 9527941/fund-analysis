name: Update Fund NAV Data

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/.actions-trigger'

permissions:
  contents: write

jobs:
  update-nav:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest NAV data
        run: python .github/workflows/fetch_nav.py

      - name: Commit and push if changed
        run: |
          git config user.name "fund-bot"
          git config user.email "fund-bot[bot]@users.noreply.github.com"
          git add data/fund-nav.json index.html fund-report.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update fund data"
            git push
          fi
